    <!-- ═══ Structured Data: WebSite + Sitelinks Search ═══════════════ -->

    {
      "@context": "https://schema.org",

      "name": "InvenSync",
      "url": "https://invensync.in",

      "inLanguage": "en-IN",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",

        },
        "query-input": "required name=search_term_string"
      }
    }

    <!-- ═══ Structured Data: FAQPage ══════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is InvenSync?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "InvenSync is an AI-powered inventory management platform built for Indian businesses. It digitizes bills using AI, tracks stock in real-time across multiple sites, and provides instant profit visibility."
          }
        },
        {
          "@type": "Question",
          "name": "How does InvenSync's AI bill extraction work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You upload any invoice — handwritten, printed, or digital. InvenSync's AI reads it in seconds, extracts every line item, maps it to your inventory, and files it automatically. It works with Hindi and English bills."
          }
        },
        {
          "@type": "Question",
          "name": "What types of businesses use InvenSync?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "InvenSync is used by construction companies, cafes and restaurants, manufacturing units, and multi-branch retail businesses across India."
          }
        },
        {
          "@type": "Question",
          "name": "How much does InvenSync cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "InvenSync offers three plans: Starter at ₹1,499/month (1 site), Professional at ₹3,499/month (up to 5 sites), and Enterprise at ₹8,999/month (unlimited sites). Annual billing saves 20%."
          }
        },
        {
          "@type": "Question",
          "name": "Does InvenSync support multiple sites or locations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. InvenSync supports multi-site inventory management, allowing you to track stock transfers between sites, view per-site reports, and manage role-based access for each location."
          }
        }
      ]
    }
    </script>
